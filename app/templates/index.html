<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>isiZulu Ensemble ASR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-12 px-4">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-2">isiZulu ASR Ensemble</h1>
        <p class="text-lg text-gray-600">Advanced Multi-Agent Speech Recognition</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        
        <form id="upload-form" class="space-y-6">
            <div class="border-2 border-dashed border-indigo-300 rounded-lg p-8 text-center hover:bg-indigo-50 transition-colors cursor-pointer" id="drop-zone">
                <input id="audio-file-input" name="audio" type="file" class="hidden" accept="audio/wav, audio/mp3">
                <label for="audio-file-input" class="cursor-pointer">
                    <i class="fas fa-cloud-upload-alt text-4xl text-indigo-500 mb-3"></i>
                    <p class="text-gray-700 font-medium" id="file-name">Click to upload or drag audio file here</p>
                    <p class="text-sm text-gray-400 mt-1">WAV or MP3 (Max 10MB)</p>
                </label>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold shadow-md transition-all transform hover:scale-[1.01] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
                Transcribe Audio
            </button>
        </form>

        <div id="loader" class="hidden mt-8 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-500 border-t-transparent"></div>
            <p class="mt-2 text-indigo-600 font-medium">Processing through 3-Agent Ensemble...</p>
        </div>

        <div id="results" class="hidden mt-8 space-y-4 fade-in">
            <div class="p-4 bg-green-50 border-l-4 border-green-500 rounded-r-lg">
                <h3 class="text-sm font-bold text-green-800 uppercase tracking-wide">Final Transcription</h3>
                <p class="mt-1 text-xl text-gray-900 font-medium" id="final-text"></p>
            </div>
        </div>
        
        <div id="error-box" class="hidden mt-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm text-center"></div>

    </div>

    <footer class="mt-12 text-gray-500 text-sm">
        Powered by PyTorch & Transformers
    </footer>

    <script>
        const fileInput = document.getElementById('audio-file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const form = document.getElementById('upload-form');
        const submitBtn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const resultsDiv = document.getElementById('results');
        const finalText = document.getElementById('final-text');
        const errorBox = document.getElementById('error-box');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileNameDisplay.textContent = fileInput.files[0].name;
                fileNameDisplay.classList.add('text-indigo-600');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (fileInput.files.length === 0) {
                alert('Please select an audio file first.');
                return;
            }

            // Reset UI
            resultsDiv.classList.add('hidden');
            errorBox.classList.add('hidden');
            loader.classList.remove('hidden');
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append('audio', fileInput.files[0]);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Server error');

                finalText.textContent = data['Final Ensemble'];
                resultsDiv.classList.remove('hidden');

            } catch (error) {
                errorBox.textContent = error.message;
                errorBox.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
